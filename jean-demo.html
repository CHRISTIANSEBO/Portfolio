<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jean — AI Email Assistant Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0b10;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .carousel-container {
      width: 100%;
      height: 100%;
      background: #0a0b10;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.6);
    }

    .carousel-wrapper {
      position: relative;
      width: 100%;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .carousel-track {
      display: flex;
      height: 100%;
      transition: transform 0.5s ease;
    }

    .carousel-slide {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0b10;
    }

    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .carousel-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background: #0e1018;
      border-top: 1px solid #232838;
      flex-shrink: 0;
    }

    button {
      background: #7c7bff;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    button:hover { background: #6a69ff; }
    button:disabled { background: #3d3c6b; cursor: not-allowed; opacity: 0.5; }

    .slide-counter {
      color: #9aa0b5;
      font-size: 14px;
      font-weight: 500;
    }

    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      padding: 10px 0;
      border-bottom: 1px solid #232838;
      flex-shrink: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3d3c6b;
      cursor: pointer;
      transition: background 0.2s;
    }

    .dot.active { background: #7c7bff; }
    .dot:hover { background: #5a5988; }

    @media (max-width: 768px) {
      .carousel-slide { min-height: 350px; }
      .carousel-controls { flex-wrap: wrap; gap: 12px; }
      button { padding: 8px 12px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="carousel-container">
    <div class="dots" id="dots"></div>

    <div class="carousel-wrapper">
      <div class="carousel-track" id="track">
        <div class="carousel-slide"><img src="/assets/jean-image-1-1.png" alt="Jean demo slide 1"></div>
        <div class="carousel-slide"><img src="/assets/jean-image-2-1.png" alt="Jean demo slide 2"></div>
        <div class="carousel-slide"><img src="/assets/jean-image-3-1.png" alt="Jean demo slide 3"></div>
        <div class="carousel-slide"><img src="/assets/jean-image-4-1.png" alt="Jean demo slide 4"></div>
        <div class="carousel-slide"><img src="/assets/jean-image-5-1.png" alt="Jean demo slide 5"></div>
        <div class="carousel-slide"><img src="/assets/jean-image-6-1.png" alt="Jean demo slide 6"></div>
        <div class="carousel-slide"><img src="/assets/jean-image-7-1.png" alt="Jean demo slide 7"></div>
      </div>
    </div>

    <div class="carousel-controls">
      <button id="prev">← Previous</button>
      <span class="slide-counter"><span id="current">1</span> / <span id="total">7</span></span>
      <button id="next">Next →</button>
    </div>
  </div>

  <script>
    let currentSlide = 0;
    const totalSlides = 7;
    const track = document.getElementById('track');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const dotsContainer = document.getElementById('dots');

    // Create dots
    for (let i = 0; i < totalSlides; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.onclick = () => goToSlide(i);
      dotsContainer.appendChild(dot);
    }

    function updateSlide() {
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      document.getElementById('current').textContent = currentSlide + 1;

      // Update dots
      document.querySelectorAll('.dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentSlide);
      });

      // Update button states
      prevBtn.disabled = currentSlide === 0;
      nextBtn.disabled = currentSlide === totalSlides - 1;
    }

    function goToSlide(n) {
      currentSlide = Math.max(0, Math.min(n, totalSlides - 1));
      updateSlide();
    }

    prevBtn.onclick = () => goToSlide(currentSlide - 1);
    nextBtn.onclick = () => goToSlide(currentSlide + 1);

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goToSlide(currentSlide - 1);
      if (e.key === 'ArrowRight') goToSlide(currentSlide + 1);
    });

    updateSlide();
  </script>
</body>
</html>
